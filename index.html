<script>
const DATA=[{"name": "FunkSec", "akas": "unknown", "reported": "Jan 2025", "activity": "Dec 2024 – Jan 2025", "rsort": 202501, "asort": 202412, "brief": "\"The individuals behind FunkSec appear to have extensively leveraged AI to enhance their capabilities, as evidenced by their publications and tools. Their public script offerings include extensive code comments with perfect English (as opposed to very basic English in other mediums), likely generated by an LLM agent. Similar patterns are visible in the Rust source code linked to the group’s ransomware, suggesting it may have been developed with AI assistance. In some of their published messages, the group specifically linked the development of their ransomware to AI-assisted agents, likely providing it with the source code for the ransomware and simply shared the output on their site. The use of such tools aligns closely with the group’s public claims, as they also released an AI chatbot based on Miniapps to support their operations\"", "ttp": "LLM-enhanced scripting techniques T1588 - Develop Capabilities: Tool", "table": "main", "links": [{"t": "CheckPoint Research", "u": "https://research.checkpoint.com/2025/funksec-alleged-top-ransomware-group-powered-by-ai/"}, {"t": "Check Point", "u": "https://research.checkpoint.com/2025/funksec-alleged-top-ransomware-group-powered-by-ai/"}]}, {"name": "Salt Typhoon", "akas": "GhostEmperor, FamousSparrow, Earth Estries, UNC2286", "reported": "Nov 2024", "activity": "Unknown", "rsort": 202411, "asort": null, "brief": "WSJ- \"The group used sophisticated methods to infiltrate American telecom infrastructure through vulnerabilities including Cisco Systems routers, and investigators suspect the hackers relied on artificial intelligence or machine learning to further their espionage operations , people familiar with the matter said.\" InfoSec Magazine - \"Salt Typhoon’s methods included advanced use of artificial intelligence to enhance their access and intelligence-gathering efforts.\"", "ttp": "Unknown TTPs", "table": "main", "links": [{"t": "T-Mobile Hacked in Massive Chinese Breach of Telecom Networks - Wall Street Journal", "u": "https://www.wsj.com/politics/national-security/t-mobile-hacked-in-massive-chinese-breach-of-telecom-networks-4b2d7f92"}, {"t": "Archive -no paywall", "u": "http://archive.today/Uidlf"}, {"t": "InfoSecurity Magazine", "u": "https://www.infosecurity-magazine.com/news/tmobile-breached-chinese/"}, {"t": "sj.com", "u": "https://www.wsj.com/politics/national-security/t-mobile-hacked-in-massive-chinese-breach-of-telecom-networks-4b2d7f92"}]}, {"name": "Multiple Unsub - Symantic", "akas": "Unknown", "reported": "Jul 2024", "activity": "Unknown", "rsort": 202407, "asort": null, "brief": "Recent malware campaigns observed by Symantec involved phishing emails containing code used to download various payloads, including Rhadamanthys, NetSupport, CleanUpLoader (Broomstick, Oyster), ModiLoader (DBatLoader), LokiBot, and Dunihi (H-Worm). Analysis of the scripts used to deliver malware in these attacks suggests they were generated using LLMs. Symantec", "ttp": "LLM-enhanced scripting techniques T1588 - Develop Capabilities: Tool LLM-supported social engineering T1566 - Phishing LLM-enhanced scripting techniques: Execution through Windows Management Instrumentation (WMI) or PowerShell (T1059)", "table": "main", "links": [{"t": "Symantec", "u": "https://symantec-enterprise-blogs.security.com/threat-intelligence/malware-ai-llm"}]}, {"name": "Bitter APT", "akas": "APT-C-08, Aramanberry", "reported": "Unknown", "activity": "Unknown", "rsort": null, "asort": null, "brief": "the group used the online IDE platform Replit to build phishing websites Source", "ttp": "TA1588.007 - Artifical Intelligence LLM-supported social engineering T1566 - Phishing", "table": "main", "links": [{"t": "Source", "u": "https://mp.weixin.qq.com/s/wR7IgBmEuqqGQ9SCAV39Uw"}]}, {"name": "Multiple Unsub - Trend Micro", "akas": "unknown akas", "reported": "May 2024", "activity": "Unknown", "rsort": 202405, "asort": null, "brief": "Criminals are using generative AI capabilities for two purposes: To support the development of malware or malicious tools...To improve their social engineering tricks. Trend Micro", "ttp": "LLM-enhanced scripting techniques T1588 - Develop Capabilities: Tool LLM-supported social engineering T1566 - Phishing LLM-enhanced scripting techniques: Execution through Windows Management Instrumentation (WMI) or PowerShell (T1059) DeepFake for Impersonation (Fraud): Where generative AI is used to make audio, video or photographic media used to impersonate individuals", "table": "main", "links": [{"t": "Trend Micro", "u": "https://www.trendmicro.com/vinfo/gb/security/news/cybercrime-and-digital-threats/back-to-the-hype-an-update-on-how-cybercriminals-are-using-genai"}, {"t": "Trend Micro", "u": "https://www.trendmicro.com/vinfo/gb/security/news/cybercrime-and-digital-threats/back-to-the-hype-an-update-on-how-cybercriminals-are-using-genai"}, {"t": "Trend Micro", "u": "https://www.trendmicro.com/vinfo/gb/security/news/cybercrime-and-digital-threats/back-to-the-hype-an-update-on-how-cybercriminals-are-using-genai"}]}, {"name": "TA547", "akas": "Scully Spider", "reported": "Apr 2024", "activity": "Mar 2024", "rsort": 202404, "asort": 202403, "brief": "Proofpoint identified TA547 targeting German organizations with an email campaign delivering Rhadamanthys malware. This is the first time researchers observed TA547 use Rhadamanthys, an information stealer that is used by multiple cybercriminal threat actors. Additionally, the actor appeared to use a PowerShell script that researchers suspect was generated by large language model (LLM) such as ChatGPT, Gemini, CoPilot, etc. Source", "ttp": "LLM-enhanced scripting techniques: Execution through Windows Management Instrumentation (WMI) or PowerShell (T1059)", "table": "main", "links": [{"t": "Source", "u": "https://www.proofpoint.com/us/blog/threat-insight/security-brief-ta547-targets-german-organizations-rhadamanthys-stealer"}]}, {"name": "Fancy Bear", "akas": "Forest Blizzard, APT28, Strontium", "reported": "Nov 2025", "activity": "By Feb 2024 – Jun 2025", "rsort": 202511, "asort": 202402, "brief": "APT28 is a Russian military intelligence actor linked to GRU Unit 26165, who has targeted victims of both tactical and strategic interest to the Russian government. Microsoft assesses that Forest Blizzard operations play a significant supporting role to Russia’s foreign policy and military objectives both in Ukraine and in the broader international community. Forest Blizzard’s use of LLMs has involved research into various satellite and radar technologies that may pertain to conventional military operations in Ukraine, as well as generic research aimed at supporting their cyber operations. Microsoft [Update 2025-11] Deployed PROMPTSTEAL (CERT-UA tracks it as LameHug) against Ukraine in June 2025 — a Python data-miner that queries an LLM (Qwen2.5-Coder-32B-Instruct) via the Hugging Face API at runtime to generate the reconnaissance/collection commands it executes; GTIG describes it as its first observed case of malware querying an LLM in live operations. GTIG, corroborated by CERT-UA", "ttp": "LLM-informed reconnaissance T1592 - Gather Victim Org Information LLM-enhanced scripting techniques T1588 - Develop Capabilities: Tool LLM-embedded malware (runtime generation) T1059 - Command and Scripting Interpreter", "table": "main", "links": [{"t": "Microsoft", "u": "https://www.microsoft.com/en-us/security/blog/2024/02/14/staying-ahead-of-threat-actors-in-the-age-of-ai/"}, {"t": "GTIG", "u": "https://cloud.google.com/blog/topics/threat-intelligence/threat-actor-usage-of-ai-tools"}, {"t": "APT28   aka Fancy Bear", "u": "https://github.com/cybershujin/Threat-Actors-Use-of-Artifical-Intelligence/blob/main/APT28.MD"}, {"t": "github.com", "u": "https://github.com/cybershujin/Threat-Actors-Use-of-Artifical-Intelligence/blob/main/APT28.MD"}]}, {"name": "APT43", "akas": "Lazarus, Emerald Sleet, Velvet Chollima, Kimsuky, TA406, Thallium", "reported": "Feb 2024", "activity": "Unknown", "rsort": 202402, "asort": null, "brief": "North Korean threat actor with recent operations relied on spear-phishing emails to compromise and gather intelligence from prominent individuals with expertise on North Korea. Microsoft observed Emerald Sleet impersonating reputable academic institutions and NGOs to lure victims into replying with expert insights and commentary about foreign policies related to North Korea. Emerald Sleet’s use of LLMs has been in support of this activity and involved research into think tanks and experts on North Korea, as well as the generation of content likely to be used in spear-phishing campaigns. Emerald Sleet also interacted with LLMs to understand publicly known vulnerabilities, to troubleshoot technical issues, and for assistance with using various web technologies. Microsoft This account of the use of AI was also reported by Mandiant in their 23-00016993 and 24-00002657 reports. Mandiant's 2024 reporting also mentions APT43 purchasing WormGPT in August 2023. Reports from Feb 2024 APT43 was observed on forums discussing ChatGPT along a topic about (toughly translated) \"North Korean nuclear solution\" In another report, Mandiant describes, \"We identified indications of North Korean cyber espionage actor APT43 interest in LLMs, specifically Mandiant observed evidence suggesting the group has logged on to widely available LLM tools. The group may potentially leverage LLMs to enable their operations, however the intended purpose is unclear. \" Source [Update 2026-03] Microsoft (with OpenAI) observed Emerald Sleet using LLMs to research the publicly reported vulnerability CVE-2022-30190 (MSDT \"Follina\"). Microsoft", "ttp": "LLM-assisted vulnerability research T1588.006 Obtain Capabilities: Vulnerabilities LLM-enhanced scripting techniques T1588 - Develop Capabilities: Tool LLM-supported social engineering T1566 - Phishing LLM-informed reconnaissance T1592 - Gather Victim Org Information Based on Mandiants 24-00002657 report, DeepFake for Impersonation (TTP unknown, not clear how actors used generated images from MaxAi[.]me and ZMO AI", "table": "main", "links": [{"t": "Microsoft", "u": "https://www.microsoft.com/en-us/security/blog/2024/02/14/staying-ahead-of-threat-actors-in-the-age-of-ai/"}, {"t": "Source", "u": "https://www.mandiant.com/resources/blog/threat-actors-generative-ai-limited"}, {"t": "Microsoft", "u": "https://www.microsoft.com/en-us/security/blog/2026/03/06/ai-as-tradecraft-how-threat-actors-operationalize-ai/"}]}, {"name": "Imperial Kitten", "akas": "Crimson Sandstorm, Yellowliderc, Tortoiseshell", "reported": "Feb 2024", "activity": "Unknown", "rsort": 202402, "asort": null, "brief": "Iranian threat actor assessed to be connected to the Islamic Revolutionary Guard Corps (IRGC). This actor has targeted multiple sectors, including defense, maritime shipping, transportation, healthcare, and technology. These operations have frequently relied on watering hole attacks and social engineering to deliver custom .NET malware. Prior research also identified custom Crimson Sandstorm malware using email-based command-and-control (C2) channels. The use of LLMs by Crimson Sandstorm has reflected the broader behaviors that the security community has observed from this threat actor. Interactions have involved requests for support around social engineering, assistance in troubleshooting errors, .NET development, and ways in which an attacker might evade detection when on a compromised machine. Microsoft", "ttp": "LLM-supported social engineering T1566 - Phishing LLM-enhanced scripting techniques T1588 - Develop Capabilities: Tool LLM-enhanced anomaly detection evasion T1562.001 - Impair Defenses: Disable or Modify Tools", "table": "main", "links": [{"t": "Microsoft", "u": "https://www.microsoft.com/en-us/security/blog/2024/02/14/staying-ahead-of-threat-actors-in-the-age-of-ai/"}]}, {"name": "Aquatic Panda", "akas": "Charcoal Typhoon, ControlX, RedHotel, Bronze University, Red Scully, Chromium", "reported": "Feb 2024", "activity": "Unknown", "rsort": 202402, "asort": null, "brief": "Chinese state-affiliated threat actor with a broad operational scope. Activities have predominantly focused on entities within Taiwan, Thailand, Mongolia, Malaysia, France, and Nepal, with observed interests extending to institutions and individuals globally who oppose China’s policies. In recent operations, this actor group has been observed interacting with LLMs in ways that suggest a limited exploration of how LLMs can augment their technical operations. This has consisted of using LLMs to support tooling development, scripting, understanding various commodity cybersecurity tools, and for generating content that could be used to social engineer targets. Microsoft", "ttp": "LLM-informed reconnaissance T1588.006 Obtain Capabilities: Vulnerabilities LLM-enhanced scripting techniques T1587 - Develop Capabilities LLM-refined operational command techniques TA0003 - Persistence and TA004 Privilege Escalation", "table": "main", "links": [{"t": "Microsoft", "u": "https://www.microsoft.com/en-us/security/blog/2024/02/14/staying-ahead-of-threat-actors-in-the-age-of-ai/"}, {"t": "Aquatic Panda Reports", "u": "https://github.com/cybershujin/Threat-Actors-use-of-Artifical-Intelligence/tree/main/Aquatic%20Panda"}, {"t": "github.com", "u": "https://github.com/cybershujin/Threat-Actors-use-of-Artifical-Intelligence/tree/main/Aquatic%20Panda"}]}, {"name": "Sodium", "akas": "Salmon Typhoon, Samurai Panda, Maverick Panda, APT4", "reported": "Feb 2024", "activity": "2023", "rsort": 202402, "asort": 202301, "brief": "Sophisticated Chinese state-affiliated threat actor with a history of targeting US defense contractors, government agencies, and entities within the cryptographic technology sector. This threat actor has demonstrated its capabilities through the deployment of malware, such as Win32/Wkysol, to maintain remote access to compromised systems. With over a decade of operations marked by intermittent periods of dormancy and resurgence. (Sodium's) interactions with LLMs throughout 2023 appear exploratory and suggest that this threat actor is evaluating the effectiveness of LLMs in sourcing information on potentially sensitive topics, high profile individuals, regional geopolitics, US influence, and internal affairs. This tentative engagement with LLMs could reflect both a broadening of their intelligence-gathering toolkit and an experimental phase in assessing the capabilities of emerging technologies. Microsoft", "ttp": "LLM-informed reconnaissance T1593 - Search Open Websites/Domains LLM-enhanced scripting techniques T1587.001 - Develop Capabilities: Malware LLM-refined operational command techniques T1564 - Hide Artifacts LLM-Aided technical translation and explanation T1593 - Search Open Websites/Domains", "table": "main", "links": [{"t": "Microsoft", "u": "https://www.microsoft.com/en-us/security/blog/2024/02/14/staying-ahead-of-threat-actors-in-the-age-of-ai/"}]}, {"name": "Unsub1 - Kaspersky", "akas": "N/A", "reported": "Mar 2024", "activity": "2023", "rsort": 202403, "asort": 202301, "brief": "Using fake sites, they hosted “GPT chats” supposedly capable of diagnosing computer problems, making money and such. In fact, the site deployed no AI models, but only used the topic to stir interest with potential victims and make a bigger killing. One such page mimicking the Microsoft website warned visitors that their computer was infected with a Trojan. To avoid losing data, they were advised not to reboot or turn off the device until the issue was resolved. Two options were offered: call a hotline or chat with Lucy, an AI chatbot. In the second case, you had to choose a method of diagnosing the device, after which the bot said it was unable to solve the problem and recommended calling support. Naturally, professional scammers, not Microsoft engineers, were waiting at the other end of the line. *Analyst note: This sounds like Bazacall like activity* Source", "ttp": "Lookalike LLM T1583 Acquire Infrastructure", "table": "main", "links": [{"t": "Bazacall", "u": "https://www.microsoft.com/en-us/security/blog/2021/07/29/bazacall-phony-call-centers-lead-to-exfiltration-and-ransomware/"}, {"t": "Source", "u": "https://securelist.com/spam-phishing-report-2023/112015/"}]}, {"name": "Unsub2 - Kaspersky", "akas": "N/A", "reported": "Mar 2024", "activity": "Jan 2023 – Dec 2023", "rsort": 202403, "asort": 202301, "brief": "“Smart chatbots” were also used as “consultants” on making money online. On one site a bot pretending to be an Elon Musk design advertised investment services. After telling the new “client” that it could make them rich quickly, the robot asked about their education, income level, and investment experience. Regardless of the answers, the bot informed the client that it would do all the earning. Next, it demonstrated an amount it could offer and prompted the user to register simply by providing their contact details. Events then likely unfolded as in other similar schemes: The “AI” asked for a small fee in recognition of its intellectual abilities, and then simply vanished into the ether. Source", "ttp": "Lookalike LLM T1583 Acquire Infrastructure LLM-supported social engineering T1566 - Phishing", "table": "main", "links": [{"t": "Source", "u": "https://securelist.com/spam-phishing-report-2023/112015/"}]}, {"name": "Multiple Unsub - JFrog", "akas": "N/A", "reported": "Feb 2024", "activity": "By Feb 2024", "rsort": 202402, "asort": 202402, "brief": "In an \"investigation of a malicious machine-learning model...The model’s payload grants the attacker a shell on the compromised machine, enabling them to gain full control over victims’ machines through what is commonly referred to as a “backdoor”...It’s crucial to emphasize that when we refer to “malicious models”, we specifically denote those housing real, harmful payloads. Our analysis has pinpointed around 100 instances of such models to date... Source", "ttp": "LL Models used for backdoor deployment T1195.001 Supply Chain Compromise - Compromise Software Dependencies and Development Tools T1059 Command and Scripting Interpreter", "table": "main", "links": [{"t": "Source", "u": "https://jfrog.com/blog/data-scientists-targeted-by-malicious-hugging-face-ml-models-with-silent-backdoor/"}]}, {"name": "GXC Team group leader: googleXcoder", "akas": "", "reported": "Jan 2024", "activity": "Nov 2023 – Dec 2023", "rsort": 202401, "asort": 202311, "brief": "Resecurity has uncovered a cybercriminal group known as \"GXC Team\", which specializes in crafting tools for online banking theft, ecommerce fraud, and internet scams. Around November 11th, 2023, the group's leader, operating under the alias \"googleXcoder\", made multiple announcements on the Dark Web. These posts introduced a new tool that incorporates Artificial Intelligence (AI) for creating fraudulent invoices used for wire fraud and Business E-Mail Compromise (BEC) scams. This tool employs proprietary algorithms to scrutinize compromised emails through POP3/IMAP4 protocols, identifying messages that either mention invoices or include attachments with payment details. Upon detection, the tool alters the banking information of the intended recipient (like the victim's supplier) to details specified by the perpetrator. The altered invoice is then either replaced in the original message or sent to a predetermined list of contacts. These methods are commonly employed in wire fraud and well-known bogus invoice scams. Often, accountants and staff in victimized companies do not thoroughly check invoices that appear familiar or nearly genuine, leading to unverified payments. The tool's multi-language capability enables the automatic scanning of messages without any manual intervention, providing the actors with significant advantages. The tool's interface includes options to configure simple mail transfer protocol (SMTP) settings for sending out emails with the fabricated invoices it generates. Moreover, the tool includes a feature that sends reports to a designated Telegram channel, serving as an alternative to traditional command-and-control (C2C) communication. This functionality also extends to providing details about the generated invoices.", "ttp": "LLM-informed reconnaissance T1592 - Gather Victim Org Information LLM-enhanced scripting techniques T1588 - Develop Capabilities: Tool LLM-supported social engineering T1566 - Phishing LLM-directed Automated Collection T1114 Email Collection LLM-enhanced data manipulation T1565 Data Manipulation T1657 Financial Theft", "table": "main", "links": [{"t": "Resecurity", "u": "https://www.resecurity.com/blog/article/cybercriminals-implemented-artificial-intelligence-ai-for-invoice-fraud"}, {"t": "Resecurity", "u": "https://www.resecurity.com/blog/article/cybercriminals-implemented-artificial-intelligence-ai-for-invoice-fraud"}]}, {"name": "Multiple UnSub - South China Post", "akas": "", "reported": "Dec 2023", "activity": "Unknown", "rsort": 202312, "asort": null, "brief": "Four cyber attackers in China have been arrested for developing ransomware...The attack was first reported by an unidentified company in Hangzhou, capital of eastern Zhejiang province, which had its systems blocked by ransomware, according to a Thursday report by state-run Xinhua News Agency. The hackers demanded 20,000 Tether, a cryptocurrency stablecoin pegged one-to-one to the US dollar, to restore access....The police in late November arrested two suspects in Beijing and two others in Inner Mongolia, who admitted to “writing versions of ransomware, optimising the program with the help of ChatGPT, conducting vulnerability scans, gaining access through infiltration, implanting ransomware, and carrying out extortion”, the report said.", "ttp": "LLM-aided development T1587 - Develop Capabilities: Malware", "table": "main", "links": [{"t": "South China Post", "u": "https://www.scmp.com/tech/tech-trends/article/3246612/chatgpt-aided-ransomware-china-results-four-arrests-ai-raises-cybersecurity-concerns"}, {"t": "South China Morning Post", "u": "https://www.scmp.com/tech/tech-trends/article/3246612/chatgpt-aided-ransomware-china-results-four-arrests-ai-raises-cybersecurity-concerns"}]}, {"name": "baller423/goober2", "akas": "potentially star23/baller13 or just ties between them", "reported": "Feb 2024", "activity": "Unknown", "rsort": 202402, "asort": null, "brief": "Recently, our scanning environment flagged a particularly intriguing PyTorch model uploaded by a new user named baller423—though since deleted. The repository, baller423/goober2, contained a PyTorch model file harboring an intriguing payload....This IP address range belonging to KREOnet, which stands for “Korea Research Environment Open NETwork,” may serve as potential evidence suggesting the involvement of researchers in attempting the exploit Source", "ttp": "LL Models used for backdoor deployment T1195.001 Supply Chain Compromise - Compromise Software Depedencies and Development Tools T1059.001 Command and Scripting Interpreter: Powershell", "table": "main", "links": [{"t": "Source", "u": "https://jfrog.com/blog/data-scientists-targeted-by-malicious-hugging-face-ml-models-with-silent-backdoor/"}]}, {"name": "star23/baller13", "akas": "potentially baller423/goober2 or just ties between them", "reported": "Feb 2024", "activity": "Unknown", "rsort": 202402, "asort": null, "brief": "Shortly after the model was removed, we encountered further instances of the same payload with varying IP addresses. One such instance remains active: star23/baller13. It’s worth noting the similarity in the model name to the deleted user, suggesting potential ties between them. Source", "ttp": "LL Models used for backdoor deployment T1195.001 Supply Chain Compromise - Compromise Software Depedencies and Development Tools T1059.001 Command and Scripting Interpreter: Powershell", "table": "main", "links": [{"t": "Source", "u": "https://jfrog.com/blog/data-scientists-targeted-by-malicious-hugging-face-ml-models-with-silent-backdoor/"}]}, {"name": "Multiple Unsub - NCSC UK", "akas": "N/A", "reported": "Jan 2024", "activity": "Unknown", "rsort": 202401, "asort": null, "brief": "Threat actors, including ransomware actors, are already using AI to increase the efficiency and effectiveness of aspects of cyber operations, such as reconnaissance, phishing and coding Source", "ttp": "LLM-informed reconnaissance T1593 - Search Open Websites/Domains LLM-supported social engineering T1566 - Phishing LLM-aided development T1587 - Develop Capabilities: Tool LLM-aided development T1587 - Develop Capabilities: Malware LLM-enhanced scripting techniques T1587 - Develop Capabilities", "table": "main", "links": [{"t": "Source", "u": "https://www.ncsc.gov.uk/report/impact-of-ai-on-cyber-threat"}, {"t": "Multiple   Unsub - NCSC", "u": "https://github.com/cybershujin/Threat-Actors-Use-of-Artifical-Intelligence/tree/main/Multiple UnSub SlashNext"}, {"t": "github.com", "u": "https://github.com/cybershujin/Threat-Actors-Use-of-Artifical-Intelligence/tree/main/Multiple"}]}, {"name": "Multiple Unsub - SlashNext", "akas": "N/A", "reported": "Oct 2023", "activity": "Oct 2022 – Sep 2023", "rsort": 202310, "asort": 202210, "brief": "Since Q4 of 2022 when ChatGPT became widely available, there has been a 1,265% increase in malicious phishing emails, with a 967% rise in credential phishing in particular. Source", "ttp": "LLM-supported social engineering T1566 - Phishing", "table": "main", "links": [{"t": "Source", "u": "https://www.cnbc.com/2023/11/28/ai-like-chatgpt-is-creating-huge-increase-in-malicious-phishing-email.html"}, {"t": "Multile   Unsub - SlashNext", "u": "https://github.com/cybershujin/Threat-Actors-Use-of-Artifical-Intelligence/tree/main/Multiple UnSub SlashNext"}, {"t": "github.com", "u": "https://github.com/cybershujin/Threat-Actors-Use-of-Artifical-Intelligence/tree/main/Multiple"}]}, {"name": "Multiple Unsub North Korea - US National Security Advisor", "akas": "N/A", "reported": "Oct 2023", "activity": "Unknown", "rsort": 202310, "asort": null, "brief": "On Oct. 18, 2023 U.S. Deputy National Security Advisor Anne Neuberger said that North Korea's use of artificial intelligence (AI) is enhancing the country's cyber capabilities, which puts enterprises around the globe at significant risk. Neuberger said, \"We have observed some North Korean and other nation-state and criminal actors try to use AI models to help accelerate writing malicious software and finding systems to exploit.\"", "ttp": "LLM-assisted vulnerability research T1588.006 Obtain Capabilities: Vulnerabilities LLM-enhanced scripting techniques T1588 - Develop Capabilities: Tool", "table": "main", "links": []}, {"name": "Scattered Spider", "akas": "UNC3944, Storm-0875", "reported": "Feb 2024", "activity": "Unknown", "rsort": 202402, "asort": null, "brief": "In the second half of 2023, SCATTERED SPIDER used the Azure AD PowerShell module to download all Entra ID user immutable IDs at a North American financial services victim. Using its Entra ID backdoor, the adversary could log in as any of the downloaded users. The PowerShell used to download the users’ immutable IDs resembled large language model (LLM) outputs such as those from ChatGPT. In particular, the pattern of one comment, the actual command and then a new line for each command matches the Llama 2 70B model output. Source", "ttp": "LLM-enhanced scripting techniques T1588 - Develop Capabilities: Tool", "table": "main", "links": [{"t": "Source", "u": "https://asantecloud.com/wp-content/uploads/2024/02/GlobalThreatReport2024_Asante.pdf"}]}, {"name": "Indrik Spider", "akas": "Evil Corp", "reported": "Feb 2024", "activity": "Feb 2023", "rsort": 202402, "asort": 202302, "brief": "In February 2023, CrowdStrike Services responded to an INDRIK SPIDER incident involving BITWISE SPIDER’s LockBit RED ransomware. During this incident, INDRIK SPIDER exfiltrated credentials from cloud-based credential manager Azure Key Vault. Logs show that INDRIK SPIDER also visited ChatGPT while interacting with the Azure Portal. In addition to visiting ChatGPT while browsing the Azure Portal — presumably to understand how to navigate in Azure — browsing activity analysis indicates INDRIK SPIDER used search engines such as Google and Bing and searched on GitHub during the operations to understand how to exfiltrate Azure Key Vault credentials. Using search engines and visiting ChatGPT indicate that though INDRIK SPIDER is likely new to the cloud and not yet sophisticated in this domain, it is using generative AI to fill these knowledge gaps. Source", "ttp": "LLM-informed reconnaissance T1593 - Search Open Websites/Domains Source", "table": "main", "links": [{"t": "Source", "u": "https://asantecloud.com/wp-content/uploads/2024/02/GlobalThreatReport2024_Asante.pdf"}]}, {"name": "UnSubs - Mandiant", "akas": "N/A but described as \"actors aligned with nation-states including Russia, the People's Republic of China (PRC), Iran, Ethiopia, Indonesia, Cuba, Argentina, Mexico, Ecuador, and El Salvador, along with non-state actors such as individuals on the 4chan forum.\"", "reported": "Aug 2023", "activity": "2019 – Aug 2023", "rsort": 202308, "asort": 201901, "brief": "Since 2019, Mandiant has identified numerous instances of information operations leveraging GANs, typically for use in profile photos of inauthentic personas, including by actors aligned with nation-states including Russia, the People's Republic of China (PRC), Iran, Ethiopia, Indonesia, Cuba, Argentina, Mexico, Ecuador, and El Salvador, along with non-state actors such as individuals on the 4chan forum. We judge that the publicly available nature of GAN-generated image tools such as the website thispersondoesnotexist.com has likely contributed to their frequent usage in information operations (Figure 2). Actors have also taken steps to obfuscate the AI-generated origin of their profile photos through tactics like adding filters or retouching facial features...Mandiant has noted evidence of financially motivated actors using manipulated video and voice content in business email compromise (BEC) scams, North Korean cyber espionage actors using manipulated images to defeat know your customer (KYC) requirements, and voice changing technology used in social engineering targeting Israeli soldiers. Source", "ttp": "DeepFake for Impersonation T1587 - Develop capabilities", "table": "main", "links": [{"t": "Source", "u": "https://www.mandiant.com/resources/blog/threat-actors-generative-ai-limited"}]}, {"name": "CanadianKingpin12", "akas": "", "reported": "Unknown", "activity": "Unknown", "rsort": null, "asort": null, "brief": "An investigation from researchers at cybersecurity company SlashNext, reveals that CanadianKingpin12 is actively training new chatbots using unrestricted data sets sourced from the dark web or basing them on sophisticated large language models developed for fighting cybercrime. The researchers also learned that the advertiser also had access to another large language model named DarkBERT developed by South Korean researchers and trained on dark web data but to fight cybercrime. This is not included in the analysis, but wanted to list this report for completeness. The reason this is not used in analysis is based on Dr.Chung, the Head of AI & the author of DarkBERT at S2W comment: *Since S2W adheres to the strict and ethical guidelines outlined by the ACL, access to DarkBERT is granted following careful evaluation and is exclusively approved for academic and public interest.*", "ttp": "N/A source not credible", "table": "main", "links": []}, {"name": "GTG-1002", "akas": "Chinese state-sponsored (Anthropic designation); MITRE ATT&CK Campaign C0062", "reported": "Nov 2025", "activity": "Sep 2025", "rsort": 202511, "asort": 202509, "brief": "Anthropic disrupted what it calls the first reported AI-orchestrated cyber-espionage campaign: the actor manipulated Claude Code (via a \"defensive security firm\" roleplay jailbreak and task decomposition) into running a largely autonomous intrusion against ~30 global targets (major tech, financial, chemical, government), succeeding in a small number. AI performed an estimated 80–90% of tactical work — reconnaissance, exploit research/writing, credential harvesting, lateral movement, and data triage/exfiltration — with only 4–6 human decision points per campaign. Anthropic", "ttp": "LLM-orchestrated operations TA0002 - Execution (full kill-chain) LLM-informed reconnaissance T1595 - Active Scanning LLM-assisted vulnerability research T1588.006 - Obtain Capabilities: Vulnerabilities LLM-aided development T1587 - Develop Capabilities LLM-directed Automated Collection T1567 - Exfiltration Over Web Service", "table": "main", "links": [{"t": "Anthropic", "u": "https://www.anthropic.com/news/disrupting-AI-espionage"}, {"t": "Anthropic – Disrupting the first reported AI-orchestrated cyber espionage campaign", "u": "https://www.anthropic.com/news/disrupting-AI-espionage"}, {"t": "Anthropic", "u": "https://www.anthropic.com/news/disrupting-AI-espionage"}]}, {"name": "GTG-2002", "akas": "\"vibe hacking\" data-extortion actor (Anthropic)", "reported": "Aug 2025", "activity": "Unknown", "rsort": 202508, "asort": null, "brief": "Used Claude Code as an active operational agent across at least 17 organizations (healthcare, emergency services, government, religious) in roughly a month: automated reconnaissance, credential harvesting, and network penetration, then analyzed exfiltrated data to size ransom demands ($75K–$500K+ in BTC) and generated per-victim custom HTML ransom notes. First confirmed AI-run extortion operation. Anthropic", "ttp": "LLM-orchestrated operations TA0002 - Execution LLM-aided development T1587.001 - Develop Capabilities: Malware LLM-enhanced extortion/negotiation T1657 - Financial Theft LLM-directed Automated Collection T1567 - Exfiltration Over Web Service", "table": "main", "links": [{"t": "Anthropic", "u": "https://www.anthropic.com/news/detecting-countering-misuse-aug-2025"}, {"t": "Anthropic – Detecting and countering misuse of AI: August 2025", "u": "https://www.anthropic.com/news/detecting-countering-misuse-aug-2025"}, {"t": "Anthropic", "u": "https://www.anthropic.com/news/detecting-countering-misuse-aug-2025"}]}, {"name": "GTG-5004", "akas": "UnSub RaaS developer (Anthropic)", "reported": "Aug 2025", "activity": "Jan 2025 – Aug 2025", "rsort": 202508, "asort": 202501, "brief": "A low-skill criminal, apparently dependent on the model, used Claude to build, market, and sell a ransomware-as-a-service line (ChaCha20 encryption, anti-EDR, anti-recovery, Windows-internals exploitation), sold since ~January 2025 on Dread, CryptBB and Nulled at ~$400 (DLL/exe) / ~$800 (full RaaS kit with PHP console + C2) / ~$1,200 (FUD crypter). Anthropic", "ttp": "LLM-aided development T1587.001 - Develop Capabilities: Malware LLM-optimized payload crafting T1027 - Obfuscated Files/Information (FUD crypter) LLM-enhanced anomaly detection evasion T1562.001 - Impair Defenses (anti-EDR) T1490 - Inhibit System Recovery", "table": "main", "links": [{"t": "Anthropic", "u": "https://www.anthropic.com/news/detecting-countering-misuse-aug-2025"}, {"t": "Anthropic – Detecting and countering misuse of AI: August 2025", "u": "https://www.anthropic.com/news/detecting-countering-misuse-aug-2025"}, {"t": "Anthropic", "u": "https://www.anthropic.com/news/detecting-countering-misuse-aug-2025"}]}, {"name": "APT41", "akas": "Wicked Panda, BARIUM, Winnti, Double Dragon (PRC)", "reported": "Nov 2025", "activity": "Aug 2025", "rsort": 202511, "asort": 202508, "brief": "Through August 2025, GTIG observed APT41 using Gemini for C++/Golang code development on multiple tools — including a C2 framework the actor called O    return ((a[sortK]||"")+"").localeCompare((b[sortK]||"")+"")*sortDir;});
